      "RoxygenNote": "7.2.3",
      "NeedsCompilation": "no",
      "Author": "Henrik Bengtsson [aut, cre, cph]",
      "Maintainer": "Henrik Bengtsson <henrikb@braju.com>",
      "Repository": "CRAN"
    },
