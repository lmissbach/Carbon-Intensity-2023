    "DALEX": {
      "Package": "DALEX",
      "Version": "2.4.3",
      "Source": "Repository",
      "Title": "moDel Agnostic Language for Exploration and eXplanation",
      "Authors@R": "c(person(\"Przemyslaw\", \"Biecek\", email = \"przemyslaw.biecek@gmail.com\", role = c(\"aut\", \"cre\"),  comment = c(ORCID = \"0000-0001-8423-1823\")), person(\"Szymon\", \"Maksymiuk\", role = \"aut\", comment = c(ORCID = \"0000-0002-3120-1601\")), person(\"Hubert\", \"Baniecki\", role = \"aut\", comment = c(ORCID = \"0000-0001-6661-5364\")))",
      "Description": "Any unverified black box model is the path to failure. Opaqueness leads to distrust.  Distrust leads to ignoration. Ignoration leads to rejection.  DALEX package xrays any model and helps to explore and explain its behaviour. Machine Learning (ML) models are widely used and have various applications in classification  or regression. Models created with boosting, bagging, stacking or similar techniques are often used due to their high performance. But such black-box models usually lack direct interpretability. DALEX package contains various methods that help to understand the link between input variables  and model output. Implemented methods help to explore the model on the level of a single instance  as well as a level of the whole dataset. All model explainers are model agnostic and can be compared across different models. DALEX package is the cornerstone for 'DrWhy.AI' universe of packages for visual model exploration. Find more details in (Biecek 2018) <arXiv:1806.08915>.",
      "License": "GPL",
      "Encoding": "UTF-8",
      "LazyData": "true",
      "RoxygenNote": "7.2.3",
      "Depends": [
        "R (>= 3.5)"
      ],
      "Imports": [
        "ggplot2",
        "iBreakDown (>= 1.3.1)",
        "ingredients (>= 2.0)"
      ],
      "Suggests": [
        "gower",
        "ranger",
        "testthat",
        "methods"
      ],
      "URL": "https://modeloriented.github.io/DALEX/, https://dalex.drwhy.ai",
      "BugReports": "https://github.com/ModelOriented/DALEX/issues",
      "NeedsCompilation": "no",
      "Author": "Przemyslaw Biecek [aut, cre] (<https://orcid.org/0000-0001-8423-1823>), Szymon Maksymiuk [aut] (<https://orcid.org/0000-0002-3120-1601>), Hubert Baniecki [aut] (<https://orcid.org/0000-0001-6661-5364>)",
      "Maintainer": "Przemyslaw Biecek <przemyslaw.biecek@gmail.com>",
      "Repository": "CRAN"
    },
    "DALEXtra": {
      "Package": "DALEXtra",
      "Version": "2.3.0",
      "Source": "Repository",
      "Title": "Extension for 'DALEX' Package",
      "Authors@R": "c(person(given = \"Szymon\", family = \"Maksymiuk\", role = c(\"aut\", \"cre\"), email = \"sz.maksymiuk@gmail.com\", comment = c(ORCID = \"0000-0002-3120-1601\")), person(given = \"Przemyslaw\",  family = \"Biecek\",  email = \"przemyslaw.biecek@gmail.com\",  role = c(\"aut\"),  comment = c(ORCID = \"0000-0001-8423-1823\")), person(\"Hubert\", \"Baniecki\", role = \"aut\"), person(\"Anna\", \"Kozak\", role = \"ctb\"))",
      "Description": "Provides wrapper of various machine learning models.  In applied machine learning, there  is a strong belief that we need to strike a balance  between interpretability and accuracy.  However, in field of the interpretable machine learning,  there are more and more new ideas for explaining black-box models,  that are implemented in 'R'.  'DALEXtra' creates 'DALEX' Biecek (2018) <arXiv:1806.08915> explainer for many type of models including those created using 'python' 'scikit-learn' and 'keras' libraries, and 'java' 'h2o' library.  Important part of the package is Champion-Challenger analysis and innovative approach to model performance across subsets of test data presented in Funnel Plot.",
      "Depends": [
        "R (>= 3.5.0)",
        "DALEX (>= 2.4.0)"
      ],
      "License": "GPL",
